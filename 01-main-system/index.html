                 YEYO 💎
      TEMPORARILY CLOSED • IOS STYLE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temporarily Closed</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                 YEYO 💎
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Inter',sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:#050816;

    position:relative;

    color:white;

}

/* BACKGROUND */

.bg{

    position:absolute;
    border-radius:50%;

    filter:blur(100px);

    opacity:.5;

}

.bg1{

    width:320px;
    height:320px;

    background:#2563eb;

    top:-100px;
    left:-100px;

}

.bg2{

    width:300px;
    height:300px;

    background:#7c3aed;

    bottom:-100px;
    right:-100px;

}

.bg3{

    width:250px;
    height:250px;

    background:#06b6d4;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

}

/* CARD */

.card{

    width:92%;
    max-width:430px;

    padding:40px 30px;

    border-radius:35px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.08);

    text-align:center;

    position:relative;
    z-index:5;

}

/* ORB */

.orb-wrap{

    width:100px;
    height:100px;

    margin:0 auto 25px;

    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;

}

.orb{

    width:32px;
    height:32px;

    border-radius:50%;

    background:#ff2d55;

    box-shadow:
    0 0 25px rgba(255,45,85,.8),
    0 0 70px rgba(255,45,85,.4);

    z-index:5;

}

.ring{

    position:absolute;

    width:50px;
    height:50px;

    border-radius:50%;

    border:2px solid rgba(255,45,85,.4);

    animation:pulse 2s infinite;

}

.ring2{
    animation-delay:1s;
}

@keyframes pulse{

    0%{
        transform:scale(1);
        opacity:1;
    }

    100%{
        transform:scale(2.5);
        opacity:0;
    }

}

/* TEXT */

.label{

    color:#7db3ff;

    font-size:.75rem;
    font-weight:700;

    letter-spacing:4px;

    margin-bottom:14px;

}

h1{

    font-size:3rem;
    line-height:1;

    font-weight:800;

    letter-spacing:-2px;

    margin-bottom:20px;

}

.desc{

    color:#b6c0da;

    line-height:1.8;

    margin-bottom:30px;

}

/* INFO BOX */

.info{

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.08);

    border-radius:22px;

    padding:18px;

    margin-bottom:28px;

}

.row{

    display:flex;
    justify-content:space-between;

    padding:14px 0;

    border-bottom:1px solid rgba(255,255,255,.06);

}

.row:last-child{
    border:none;
}

.left{

    color:#8e9bb8;

    font-size:.8rem;

    font-weight:600;

}

.right{

    font-weight:600;

}

.red{
    color:#ff6b81;
}

/* BUTTON */

button{

    width:100%;

    padding:16px;

    border:none;
    outline:none;

    border-radius:20px;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        135deg,
        #3b82f6,
        #2563eb
    );

    box-shadow:
    0 10px 30px rgba(37,99,235,.35);

    transition:.35s;

}

button:hover{

    transform:translateY(-2px);

}

button:active{

    transform:scale(.98);

}

/* MOBILE */

@media(max-width:600px){

    h1{
        font-size:2.3rem;
    }

    .card{
        padding:34px 22px;
    }

}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                 YEYO 💎
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

</style>

</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>
<div class="bg bg3"></div>

<div class="card">

    <div class="orb-wrap">

        <div class="ring"></div>
        <div class="ring ring2"></div>

        <div class="orb"></div>

    </div>

    <div class="label">
        SYSTEM STATUS
    </div>

    <h1>
        TEMPORARILY<br>
        CLOSED
    </h1>

    <p class="desc">
        This portal is currently unavailable due to maintenance or ongoing upgrades.
    </p>

    <div class="info">

        <div class="row">
            <div class="left">STATUS</div>
            <div class="right red">Offline</div>
        </div>

        <div class="row">
            <div class="left">SERVER</div>
            <div class="right">Maintenance</div>
        </div>

        <div class="row">
            <div class="left">RETURN</div>
            <div class="right">Soon</div>
        </div>

    </div>

    <button id="reloadBtn">
        Refresh Page
    </button>

</div>

<script>

const reloadBtn = document.getElementById('reloadBtn');

reloadBtn.addEventListener('click', () => {

    reloadBtn.innerHTML = 'Refreshing...';

    setTimeout(() => {

        location.reload();

    }, 700);

});

</script>

</body>
</html>
